name: UiPath Package & Publish to Orchestrator
 
# ─────────────────────────────────────────────────────────────
# TRIGGER: Any comment containing "merge"
# ─────────────────────────────────────────────────────────────
on:
  issue_comment:
    types: [created]
 
jobs:
 
  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Gate: validate comment contains "merge", get PR branch
  # ─────────────────────────────────────────────────────────────
  check-comment:
    name: Check Comment Trigger
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, 'merge')
    outputs:
      pr_number: ${{ steps.pr-info.outputs.pr_number }}
      head_ref:  ${{ steps.pr-info.outputs.head_ref }}
    steps:
      - name: Get latest open PR
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              state:     'open',
              sort:      'created',
              direction: 'desc',
              per_page:  1
            });
            if (prs.length === 0) core.setFailed('No open pull requests found.');
            const pr = prs[0];
            core.setOutput('pr_number', pr.number);
            core.setOutput('head_ref',  pr.head.ref);
            console.log(`Latest open PR #${pr.number} — branch: ${pr.head.ref}`);
 
  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Pack & Publish from PR branch
  #
  # Checkout PR branch → bump version → pack → publish to Orchestrator
  # If publish succeeds → Job 3 merges to master
  # ─────────────────────────────────────────────────────────────
  package-and-publish:
    name: Package & Publish to Orchestrator
    needs: check-comment
    runs-on: windows-latest
 
    env:
      UIPATH_CLI_VERSION: "25.10.21"
      PROJECT_PATH:       "."
      OUTPUT_PATH:        "${{ github.workspace }}\\output"
      PR_BRANCH:          ${{ needs.check-comment.outputs.head_ref }}
 
      # ── All from GitHub Secrets ──────────────────────────────
      UIPATH_ORCH_URL:    ${{ secrets.UIPATH_ORCH_URL }}
      UIPATH_ORG:         ${{ secrets.UIPATH_ORG }}
      UIPATH_TENANT:      ${{ secrets.UIPATH_TENANT }}
      UIPATH_FOLDER:      ${{ secrets.UIPATH_FOLDER }}
      UIPATH_PAT:         ${{ secrets.UIPATH_PAT }}
 
    steps:
 
      # 1. Checkout PR branch (not master)
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-comment.outputs.head_ref }}
          fetch-depth: 0
          persist-credentials: true
 
      # 2. Cache dotnet tool install
      - name: Cache UiPath CLI dotnet tool
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: $HOME/.dotnet/tools
          key: uipath-cli-${{ env.UIPATH_CLI_VERSION }}
 
      # 3. Install UiPath.CLI.Windows (if not cached)
      - name: Install UiPath CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          dotnet tool install --global UiPath.CLI.Windows --version $env:UIPATH_CLI_VERSION
          Write-Host "UiPath CLI installed: $env:UIPATH_CLI_VERSION"
 
      # 4. Add dotnet tools to PATH
      - name: Add dotnet tools to PATH
        shell: powershell
        run: |
          $toolsPath = "$env:USERPROFILE\.dotnet\tools"
          echo "$toolsPath" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "Added to PATH: $toolsPath"
 
      # 5. Create output directory
      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "$env:OUTPUT_PATH" | Out-Null
 
      # 6. Read version from project.json on PR branch and auto-increment patch
      - name: Derive package version
        shell: powershell
        run: |
          $projectJson = Get-Content "$env:PROJECT_PATH\project.json" -Raw | ConvertFrom-Json
          $ver = $projectJson.projectVersion
          if (-not $ver) { Write-Error "projectVersion not found in project.json!"; exit 1 }
          $parts = $ver -split '\.'
          if ($parts.Count -ge 3) {
            $parts[2] = [int]$parts[2] + 1
            $newVer = $parts -join '.'
          } else {
            $newVer = $ver
          }
          Write-Host "PR branch version  : $ver"
          Write-Host "Publishing version : $newVer"
          "PACKAGE_VERSION=$newVer" | Out-File -FilePath $env:GITHUB_ENV -Append
 
      # 7. Write new version back to project.json and commit to PR branch
      - name: Update project.json and commit to PR branch
        shell: powershell
        run: |
          $projectJsonPath = "$env:PROJECT_PATH\project.json"
          $projectJson = Get-Content $projectJsonPath -Raw | ConvertFrom-Json
          $projectJson.projectVersion = $env:PACKAGE_VERSION
          $projectJson | ConvertTo-Json -Depth 100 | Set-Content $projectJsonPath -Encoding UTF8
          Write-Host "project.json updated to: $env:PACKAGE_VERSION"
 
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$projectJsonPath"
          git commit -m "chore: bump version to $env:PACKAGE_VERSION [skip ci]"
          git push origin $env:PR_BRANCH
          Write-Host "Committed and pushed to PR branch: $env:PR_BRANCH"
 
      # 8. Pack from PR branch
      - name: Pack UiPath project
        shell: powershell
        shell: powershell
        run: |
          # Redirect NuGet package cache away from project dir to prevent .local conflict
          $env:NUGET_PACKAGES = "C:\nuget-cache"
 
          # Delete .local if it somehow exists
          if (Test-Path ".local") { Remove-Item -Recurse -Force ".local" }
 
          uipcli package pack "$env:PROJECT_PATH\project.json" `
            --output "$env:OUTPUT_PATH" `
            --version "$env:PACKAGE_VERSION" `
            --autoVersion false `
            --skipValidate
 
          if ($LASTEXITCODE -ne 0) { Write-Error "Pack failed!"; exit 1 }
          Write-Host "Pack complete."
 
      # 9. Publish to Orchestrator via REST API (PAT as Bearer)
      - name: Publish to Orchestrator via API
        shell: powershell
        run: |
          $nupkg = Get-ChildItem "$env:OUTPUT_PATH" -Filter "*.nupkg" | Select-Object -First 1
          if (-not $nupkg) { Write-Error "No .nupkg found in output!"; exit 1 }
          Write-Host "Publishing: $($nupkg.FullName)"
 
          $baseUrl   = $env:UIPATH_ORCH_URL.TrimEnd("/")
          $uploadUrl = "$baseUrl/$env:UIPATH_ORG/$env:UIPATH_TENANT/orchestrator_/odata/Processes/UiPath.Server.Configuration.OData.UploadPackage"
 
          $response = curl.exe -s -w "`n%{http_code}" `
            -X POST "$uploadUrl" `
            -H "Authorization: Bearer $env:UIPATH_PAT" `
            -H "X-UIPATH-FolderPath: $env:UIPATH_FOLDER" `
            -F "file=@'$($nupkg.FullName)'"
 
          $lines    = $response -split "`n"
          $httpCode = $lines[-1].Trim()
          $body     = ($lines[0..($lines.Count - 2)]) -join "`n"
 
          Write-Host "HTTP Status: $httpCode"
          Write-Host "Response:    $body"
 
          if ($httpCode -notmatch '^2') {
            Write-Error "Upload failed with HTTP $httpCode"
            exit 1
          }
          Write-Host "Package published successfully to Orchestrator."
 
      # 10. Upload nupkg as artifact
      - name: Upload nupkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package-${{ env.PACKAGE_VERSION }}
          path: ${{ env.OUTPUT_PATH }}\*.nupkg
          retention-days: 30
 
      # 11. Comment result on PR
      - name: Comment result on PR
        if: always()
        shell: bash
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:   ${{ needs.check-comment.outputs.pr_number }}
          PR_BRANCH:   ${{ needs.check-comment.outputs.head_ref }}
          PKG_VERSION: ${{ env.PACKAGE_VERSION }}
          ORCH_ORG:    ${{ secrets.UIPATH_ORG }}
          ORCH_TENANT: ${{ secrets.UIPATH_TENANT }}
          ORCH_FOLDER: ${{ secrets.UIPATH_FOLDER }}
          JOB_STATUS:  ${{ job.status }}
          REPO:        ${{ github.repository }}
          SHA:         ${{ github.sha }}
          RUN_ID:      ${{ github.run_id }}
          SERVER_URL:  ${{ github.server_url }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="${SERVER_URL}/${REPO}/commit/${SHA}"
 
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="[SUCCESS] UiPath Publish Succeeded - Merging to master"
            NOTE="> Package published. Merging PR #${PR_NUMBER} to master now..."
          else
            TITLE="[FAILED] UiPath Publish Failed - PR NOT merged"
            NOTE="> Publish failed - PR was NOT merged. Fix the issue and comment merge again."
          fi
 
          # Use jq to safely build JSON — avoids newline/quote escaping issues
          PAYLOAD=$(jq -n \
            --arg t  "## ${TITLE}" \
            --arg pr "#${PR_NUMBER}" \
            --arg br "${PR_BRANCH}" \
            --arg sh "${SHORT_SHA}" \
            --arg su "${COMMIT_URL}" \
            --arg pk "${PKG_VERSION}.nupkg" \
            --arg ot "${ORCH_ORG} / ${ORCH_TENANT}" \
            --arg fl "${ORCH_FOLDER}" \
            --arg ru "${RUN_URL}" \
            --arg nt "${NOTE}" \
            '{body: ([$t,"",
              "| Field            | Value |",
              "|------------------|-------|",
              ("| **PR**           | " + $pr + " |"),
              ("| **Branch**       | `" + $br + "` |"),
              ("| **Commit**       | [`" + $sh + "`](" + $su + ") |"),
              ("| **Package**      | `" + $pk + "` |"),
              ("| **Orchestrator** | " + $ot + " |"),
              ("| **Folder**       | `" + $fl + "` |"),
              ("| **Run**          | [View workflow run](" + $ru + ") |"),
              "",$nt] | join("\n"))}')
 
          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -d "$PAYLOAD"
 
  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Merge PR to master ONLY if publish succeeded
  # ─────────────────────────────────────────────────────────────
  merge-pr:
    name: Merge PR into master
    needs: package-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              pull_number:  ${{ needs.check-comment.outputs.pr_number }},
              merge_method: 'squash'
            });
            console.log('PR #${{ needs.check-comment.outputs.pr_number }} merged into master.');
 














