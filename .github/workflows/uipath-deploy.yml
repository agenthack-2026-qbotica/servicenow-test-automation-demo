name: UiPath Package & Publish to Orchestrator

# ─────────────────────────────────────────────────────────────
# TRIGGER: Any comment containing "merge"
# ─────────────────────────────────────────────────────────────
on:
  issue_comment:
    types: [created]

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1 — Gate: validate comment contains "merge"
  # ─────────────────────────────────────────────────────────────
  check-comment:
    name: Check Comment Trigger
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, 'merge')
    outputs:
      pr_number: ${{ steps.pr-info.outputs.pr_number }}
      head_ref:  ${{ steps.pr-info.outputs.head_ref }}
    steps:
      - name: Get latest open PR
        id: pr-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner:     context.repo.owner,
              repo:      context.repo.repo,
              state:     'open',
              sort:      'created',
              direction: 'desc',
              per_page:  1
            });
            if (prs.length === 0) core.setFailed('No open pull requests found.');
            const pr = prs[0];
            core.setOutput('pr_number', pr.number);
            core.setOutput('head_ref',  pr.head.ref);
            console.log(`Latest open PR #${pr.number} from branch: ${pr.head.ref}`);

  # ─────────────────────────────────────────────────────────────
  # JOB 2 — Merge the PR into master
  # ─────────────────────────────────────────────────────────────
  merge-pr:
    name: Merge PR into master
    needs: check-comment
    runs-on: ubuntu-latest
    steps:
      - name: Merge pull request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              pull_number:  ${{ needs.check-comment.outputs.pr_number }},
              merge_method: 'squash',
              base:         'master'
            });
            console.log('PR #${{ needs.check-comment.outputs.pr_number }} merged into master.');

  # ─────────────────────────────────────────────────────────────
  # JOB 3 — Pack & Publish to UiPath Orchestrator
  #
  # PACK:    dotnet tool (UiPath.CLI.Windows) → uipcli package pack
  # PUBLISH: Orchestrator REST API via curl + PAT as Bearer token
  #          POST /odata/Processes/UiPath.Server.Configuration.OData.UploadPackage
  #          Auth: Authorization: Bearer <UIPATH_PAT>   ← PAT used directly, no exchange needed
  # ─────────────────────────────────────────────────────────────
  package-and-publish:
    name: Package & Publish to Orchestrator
    needs: [check-comment, merge-pr]
    runs-on: windows-latest            # Windows required for UiPath.CLI.Windows pack

    env:
      UIPATH_CLI_VERSION: "25.10.21"   # UiPath.CLI.Windows on NuGet — confirmed latest
      PROJECT_PATH:       "."
      OUTPUT_PATH:        "${{ github.workspace }}\\output"

      # ── All from GitHub Secrets ──────────────────────────────
      UIPATH_ORCH_URL:    ${{ secrets.UIPATH_ORCH_URL }}   # https://cloud.uipath.com
      UIPATH_ORG:         ${{ secrets.UIPATH_ORG }}         # your org name in URL
      UIPATH_TENANT:      ${{ secrets.UIPATH_TENANT }}      # your tenant name in URL
      UIPATH_FOLDER:      ${{ secrets.UIPATH_FOLDER }}      # Orchestrator folder name
      UIPATH_PAT:         ${{ secrets.UIPATH_PAT }}         # pt0_xxx — used as Bearer token

    steps:

      # 1. Checkout master after merge
      - name: Checkout master branch
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      # 2. Cache dotnet tool install
      - name: Cache UiPath CLI dotnet tool
        id: cache-cli
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: uipath-cli-${{ env.UIPATH_CLI_VERSION }}

      # 3. Install UiPath.CLI.Windows via dotnet tool (if not cached)
      - name: Install UiPath CLI
        if: steps.cache-cli.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          dotnet tool install --global UiPath.CLI.Windows --version $env:UIPATH_CLI_VERSION
          Write-Host "UiPath CLI installed: $env:UIPATH_CLI_VERSION"

      # 4. Add dotnet tools to PATH
      - name: Add dotnet tools to PATH
        shell: powershell
        run: |
          $toolsPath = "$env:USERPROFILE\.dotnet\tools"
          echo "$toolsPath" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "Added to PATH: $toolsPath"

      # 5. Create output directory
      - name: Create output directory
        shell: powershell
        run: New-Item -ItemType Directory -Force -Path "$env:OUTPUT_PATH" | Out-Null

      # 6. Derive version: git tag or date.shortSHA
      - name: Derive package version
        shell: powershell
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if ($LASTEXITCODE -eq 0 -and $tag) {
            $ver = $tag.TrimStart('v')
          } else {
            $sha  = "${{ github.sha }}".Substring(0, 7)
            $date = Get-Date -Format "yyyy.M.d"
            $ver  = "$date.$sha"
          }
          Write-Host "Package version: $ver"
          "PACKAGE_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 7. Pack the UiPath project → produces .nupkg in OUTPUT_PATH
      - name: Pack UiPath project
        shell: powershell
        run: |
          uipcli package pack "$env:PROJECT_PATH\project.json" `
            --output "$env:OUTPUT_PATH" `
            --version "$env:PACKAGE_VERSION" `
            --autoVersion false
          if ($LASTEXITCODE -ne 0) { Write-Error "Pack failed!"; exit 1 }
          Write-Host "Pack complete."

      # 8. Publish .nupkg to Orchestrator via REST API using PAT as Bearer token
      #
      #    Endpoint: POST /odata/Processes/UiPath.Server.Configuration.OData.UploadPackage
      #    Auth:     Authorization: Bearer <PAT>   ← PAT used directly, no token exchange
      #    Folder:   X-UIPATH-FolderPath header
      #
      - name: Publish to Orchestrator via API
        shell: powershell
        run: |
          $nupkg = Get-ChildItem "$env:OUTPUT_PATH" -Filter "*.nupkg" | Select-Object -First 1
          if (-not $nupkg) { Write-Error "No .nupkg found in output!"; exit 1 }
          Write-Host "Publishing: $($nupkg.FullName)"

          $uploadUrl = "$env:UIPATH_ORCH_URL/$env:UIPATH_ORG/$env:UIPATH_TENANT/orchestrator_/odata/Processes/UiPath.Server.Configuration.OData.UploadPackage"

          # curl is available on Windows runners — use full URL, no leading slash (avoids Git bash path rewrite)
          $response = curl.exe -s -w "`n%{http_code}" `
            -X POST "$uploadUrl" `
            -H "Authorization: Bearer $env:UIPATH_PAT" `
            -H "X-UIPATH-FolderPath: $env:UIPATH_FOLDER" `
            -F "file=@$($nupkg.FullName)"

          # Split body and status code
          $lines     = $response -split "`n"
          $httpCode  = $lines[-1].Trim()
          $body      = ($lines[0..($lines.Count - 2)]) -join "`n"

          Write-Host "HTTP Status: $httpCode"
          Write-Host "Response:    $body"

          if ($httpCode -notmatch '^2') {
            Write-Error "Upload failed with HTTP $httpCode"
            exit 1
          }
          Write-Host "Package published successfully to Orchestrator."

      # 9. Upload .nupkg as GitHub Actions artifact (audit trail)
      - name: Upload nupkg artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uipath-package-${{ env.PACKAGE_VERSION }}
          path: ${{ env.OUTPUT_PATH }}\*.nupkg
          retention-days: 30

      # 10. Post result comment on the PR
      #     PR number  → from comment trigger (needs.check-comment.outputs.pr_number)
      #     All others → from secrets via step-level env
      - name: Comment result on PR
        if: always()
        shell: bash
        env:
          GH_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:   ${{ needs.check-comment.outputs.pr_number }}
          PKG_VERSION: ${{ env.PACKAGE_VERSION }}
          ORCH_ORG:    ${{ secrets.UIPATH_ORG }}
          ORCH_TENANT: ${{ secrets.UIPATH_TENANT }}
          ORCH_FOLDER: ${{ secrets.UIPATH_FOLDER }}
          JOB_STATUS:  ${{ job.status }}
          REPO:        ${{ github.repository }}
          SHA:         ${{ github.sha }}
          RUN_ID:      ${{ github.run_id }}
          SERVER_URL:  ${{ github.server_url }}
        run: |
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
          COMMIT_URL="${SERVER_URL}/${REPO}/commit/${SHA}"

          if [ "$JOB_STATUS" = "success" ]; then
            BODY="## ✅ UiPath Publish Succeeded

          | Field            | Value |
          |------------------|-------|
          | **PR**           | #${PR_NUMBER} |
          | **Branch**       | \`master\` (merged) |
          | **Commit**       | [\`${SHORT_SHA}\`](${COMMIT_URL}) |
          | **Package**      | \`${PKG_VERSION}.nupkg\` |
          | **Orchestrator** | ${ORCH_ORG} / ${ORCH_TENANT} |
          | **Folder**       | \`${ORCH_FOLDER}\` |
          | **Run**          | [View workflow run](${RUN_URL}) |

          > 🤖 Triggered by comment on PR #${PR_NUMBER}. Package is live in Orchestrator."
          else
            BODY="## ❌ UiPath Publish Failed

          | Field        | Value |
          |--------------|-------|
          | **PR**       | #${PR_NUMBER} |
          | **Branch**   | \`master\` |
          | **Commit**   | [\`${SHORT_SHA}\`](${COMMIT_URL}) |
          | **Package**  | \`${PKG_VERSION}.nupkg\` |
          | **Run**      | [View workflow run](${RUN_URL}) |

          > ⚠️ Check the workflow run logs for details. Package was **not** published to Orchestrator."
          fi

          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -d "$(jq -n --arg body "$BODY" '{body: $body}')"
