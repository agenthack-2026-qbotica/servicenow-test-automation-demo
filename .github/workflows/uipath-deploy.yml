Honestly, there's one issue — secrets are not directly accessible inside actions/github-script JavaScript via ${{ secrets.X }}. GitHub masks secrets in logs but more importantly, secrets can't be passed into the script: block directly for security reasons.

The fix is to pass secrets as environment variables to the step, then read them in the script via process.env:


Viewed 3 files, edited a file, ran a command
Viewed 3 files, edited a file, ran a command
Yes, this will work now. Here's exactly what was wrong and what was fixed:

The bug — ${{ secrets.X }} inside a script: block of actions/github-script is not evaluated by GitHub. The script: content runs as Node.js at runtime, but secrets interpolation only happens at the YAML parsing stage — and GitHub intentionally blocks secrets from being directly embedded in script blocks to prevent accidental exposure in logs.

The fix — bridge secrets through the step-level env: block first, then read in the script via process.env:

yaml
env:
  UIPATH_FOLDER: ${{ secrets.UIPATH_FOLDER }}   # ✅ secrets work here
  PR_NUMBER:     ${{ needs.check-comment.outputs.pr_number }}

script: |
  const folder   = process.env.UIPATH_FOLDER;   # ✅ read via process.env
  const prNumber = parseInt(process.env.PR_NUMBER);
This is the standard GitHub-documented pattern for using secrets inside github-script.


