name: Claude Code Fix

on:
  workflow_dispatch:

  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude
        run: |
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
          which claude
          claude --version

      - name: Install UiPath CLI
        run: npm install -g @uipath/cli

      - name: Install UiPath Tools
        run: |
          uip tools install @uipath/orchestrator-tool
          uip tools install @uipath/solution-tool

      - name: Install Claude Skill
        run: |
          uip skills install --agent claude

      - name: Install Dependencies
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

          if [ -f yarn.lock ]; then
            npm install -g yarn
            yarn install
          fi

          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            You are an autonomous software engineer working directly inside this GitHub repository.

            Repository:
            ${{ github.repository }}

            Branch:
            ${{ github.ref_name }}

            Event:
            ${{ github.event_name }}

            Issue Comment (may be empty for workflow_dispatch):

            ${{ github.event.comment.body }}

            Your responsibilities:

            1. Analyze the entire repository.

            2. Create a file named ANALYSIS.md in the repository root.

            ANALYSIS.md must contain:
            - Project overview
            - Folder structure
            - Technologies used
            - Build process
            - Dependencies
            - Important files
            - Suggested improvements
            - Files related to the requested issue

            3. If an issue comment exists, implement the requested change.

            4. Modify only the files necessary.

            5. Save every modified file.

            6. Do NOT ask for confirmation.

            7. Ensure all repository changes remain in the working tree.

          show_full_output: true
          display_report: true

        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Debug Repository
        run: |
          echo "===== Git Status ====="
          git status

          echo ""
          echo "===== Changed Files ====="
          git diff --name-only

          echo ""
          echo "===== Diff ====="
          git diff

          echo ""
          echo "===== Repository Files ====="
          find .

      - name: Verify Claude Changes
        id: verify
        shell: bash
        run: |

          if git diff --quiet; then
            echo "No repository changes detected."
            exit 1
          fi

          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.verify.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: claude/${{ github.run_id }}
          title: "Claude Code: Repository Analysis and Fix"
          commit-message: "Claude repository analysis and automated fix"
          delete-branch: true

          body: |
            ## Claude Code Automated Changes

            This PR was generated automatically.

            Included:

            - Repository analysis
            - ANALYSIS.md
            - Requested issue implementation
            - Repository modifications

            Trigger:
            ${{ github.event_name }}

            Issue Comment:

            ${{ github.event.comment.body }}
