name: Claude Code Fix

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Task for Claude to perform"
        required: false
        default: "Follow CLAUDE.md and review the repository."
  issue_comment:
    types:
      - created

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  claude:
    runs-on: ubuntu-latest

    # Only run on workflow_dispatch OR when a comment mentions @claude
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── Claude Code CLI ───────────────────────────────────────────────────
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude
        run: |
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
          which claude
          claude --version

      # ── UiPath ────────────────────────────────────────────────────────────
      - name: Install UiPath CLI
        run: npm install -g @uipath/cli

      - name: Install UiPath Tools
        run: |
          uip tools install @uipath/orchestrator-tool
          uip tools install @uipath/solution-tool

      - name: Install Claude Skill
        run: uip skills install --agent claude

      # ── Project Dependencies ──────────────────────────────────────────────
      - name: Install Dependencies
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
          if [ -f yarn.lock ]; then
            npm install -g yarn
            yarn install
          fi
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          fi

      # ── Git Identity ───────────────────────────────────────────────────────
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Run Claude ─────────────────────────────────────────────────────────
      #
      # AUTH — choose exactly ONE option and delete the other:
      #
      # Option A — Anthropic API key (any account):
      #   Repo secret name: ANTHROPIC_API_KEY
      #   Value: your key from console.anthropic.com → API Keys
      #
      # Option B — OAuth token (Claude Pro/Max subscribers only):
      #   Repo secret name: CLAUDE_CODE_OAUTH_TOKEN
      #   Value: run `claude setup-token` locally, copy the output
      #   ⚠️  Must be passed as a `with:` input — NOT via env: (known v1 bug)
      #
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          # ── OAuth token (Pro/Max) — must be in with:, NOT env: ──
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.prompt
                || 'Follow CLAUDE.md and complete the GitHub issue request.' }}
          claude_args: "--max-turns 20"

      # ── Debug ──────────────────────────────────────────────────────────────
      - name: Debug Repository
        run: |
          echo "===== Git Status ====="
          git status
          echo ""
          echo "===== Changed Files ====="
          git diff --name-only
          echo ""
          echo "===== Diff ====="
          git diff
          echo ""
          echo "===== Repository Files ====="
          find . -not -path './.git/*'

      # ── Check for Changes ──────────────────────────────────────────────────
      - name: Verify Claude Changes
        id: verify
        shell: bash
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No repository changes detected — skipping PR creation."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── Create PR ──────────────────────────────────────────────────────────
      - name: Create Pull Request
        if: steps.verify.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: claude/${{ github.run_id }}
          title: "Claude Code: Repository Analysis and Fix"
          commit-message: "Claude repository analysis and automated fix"
          delete-branch: true
          body: |
            ## Claude Code Automated Changes

            This PR was generated automatically by the Claude Code workflow.

            **Included:**
            - Repository analysis
            - ANALYSIS.md
            - Requested issue implementation
            - Repository modifications

            **Trigger:** `${{ github.event_name }}`

            ${{ github.event_name == 'issue_comment' && format('**Issue Comment:**{0}{1}', '%0A', github.event.comment.body) || '' }}
