name: Claude Code Fix

on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  claude:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude
        run: |
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
          which claude
          claude --version

      - name: Install UiPath CLI
        run: npm install -g @uipath/cli

      - name: Install UiPath Tools
        run: |
          uip tools install @uipath/orchestrator-tool
          uip tools install @uipath/solution-tool

      - name: Install Claude Skill
        run: uip skills install --agent claude

      - name: Install Dependencies
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
          if [ -f yarn.lock ]; then
            npm install -g yarn
            yarn install
          fi
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Build Prompt (issue_comment) ───────────────────────────────────────
      # Uses GitHub Actions multiline env var syntax: EOF delimiter
      - name: Build Prompt (issue comment)
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          COMMENT='${{ github.event.comment.body }}'
          TASK="${COMMENT/@claude/}"
          TASK="${TASK#"${TASK%%[![:space:]]*}"}"

          {
            echo "CLAUDE_PROMPT<<EOF"
            echo "You are an expert UiPath RPA developer and test automation engineer."
            echo ""
            echo "This is a UiPath test automation project that automates ServiceNow incident"
            echo "lifecycle testing via browser automation. Automation logic lives in XAML"
            echo "workflows under Workflows/ and TestCases/. You have access to UiPath skills:"
            echo "uipath-rpa, uipath-test, uipath-review, uipath-troubleshoot — use them."
            echo ""
            echo "ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
            echo ""
            echo "ISSUE DESCRIPTION:"
            echo "${{ github.event.issue.body }}"
            echo ""
            echo "USER REQUEST:"
            echo "${TASK}"
            echo ""
            echo "INSTRUCTIONS:"
            echo "1. Read the issue title, description, and user request carefully."
            echo "2. Use UiPath skills to analyse the relevant XAML files."
            echo "3. Identify the root cause."
            echo "4. Implement the fix directly in the relevant XAML or config files."
            echo "5. Create REPORT.md in the repo root with these sections:"
            echo "   ## Issue Summary — what the issue was and root cause"
            echo "   ## Changes Made — every file changed and what changed"
            echo "   ## UiPath Analysis — findings from skill analysis"
            echo "   ## Testing Notes — what to verify after the fix"
            echo "   ## Risk Assessment — risks or side effects"
            echo "6. Do NOT run git commit or git push."
            echo "EOF"
          } >> $GITHUB_ENV

      # ── Build Prompt (workflow_dispatch) ───────────────────────────────────
      - name: Build Prompt (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          {
            echo "CLAUDE_PROMPT<<EOF"
            echo "You are an expert UiPath RPA developer and test automation engineer."
            echo ""
            echo "This is a UiPath test automation project that automates ServiceNow incident"
            echo "lifecycle testing via browser automation. Automation logic lives in XAML"
            echo "workflows under Workflows/ and TestCases/. You have access to UiPath skills:"
            echo "uipath-rpa, uipath-test, uipath-review, uipath-troubleshoot — use them."
            echo ""
            echo "INSTRUCTIONS:"
            echo "1. Use UiPath skills to analyse all XAML files in Workflows/ and TestCases/."
            echo "2. Read project.json for version and dependency info."
            echo "3. Review CLAUDE.md for project guidelines."
            echo "4. Create ANALYSIS.md in the repo root with:"
            echo "   ## Project Overview — purpose, tech stack, UiPath version"
            echo "   ## Repository Structure — every folder and file with a one-line description"
            echo "   ## Test Cases — for each file in TestCases/, what scenario it tests"
            echo "   ## Workflows — for each file in Workflows/, what it does"
            echo "   ## Dependencies — packages from project.json"
            echo "   ## Known Issues / Observations — anything missing, broken, or notable"
            echo "   ## Recommendations — suggested improvements"
            echo "5. Do NOT run git commit or git push."
            echo "EOF"
          } >> $GITHUB_ENV

      # ── Run Claude ─────────────────────────────────────────────────────────
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: "actions: read"
          prompt: ${{ env.CLAUDE_PROMPT }}
          claude_args: "--max-turns 50 --permission-mode bypassPermissions"

      # ── Debug ──────────────────────────────────────────────────────────────
      - name: Debug Repository
        run: |
          echo "===== Git Status ====="
          git status
          echo ""
          echo "===== Changed Files ====="
          git diff --name-only
          echo ""
          echo "===== New/Untracked Files ====="
          git ls-files --others --exclude-standard

      # ── Check for Changes ──────────────────────────────────────────────────
      - name: Verify Claude Changes
        id: verify
        shell: bash
        run: |
          if git diff --quiet && git diff --staged --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No repository changes detected — skipping PR creation."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── Create PR ──────────────────────────────────────────────────────────
      - name: Create Pull Request
        if: steps.verify.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: claude/${{ github.run_id }}
          title: >-
            ${{ github.event_name == 'issue_comment'
              && format('fix: Issue #{0} — {1}', github.event.issue.number, github.event.issue.title)
              || 'docs: UiPath project analysis (ANALYSIS.md)' }}
          commit-message: >-
            ${{ github.event_name == 'issue_comment'
              && format('fix(#{0}): Claude automated fix', github.event.issue.number)
              || 'docs: add ANALYSIS.md project analysis' }}
          delete-branch: true
          body: |
            ## Claude Code — Automated Fix

            | Field | Value |
            |---|---|
            | **Trigger** | `${{ github.event_name }}` |
            | **Run** | `${{ github.run_id }}` |
            ${{ github.event_name == 'issue_comment' && format('| **Issue** | #{0} — {1} |', github.event.issue.number, github.event.issue.title) || '| **Task** | Repository analysis |' }}

            ${{ github.event_name == 'issue_comment' && '### User Request' || '' }}
            ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}

            ---
            > See **REPORT.md** (issue fixes) or **ANALYSIS.md** (analysis runs) in this PR for full details.
