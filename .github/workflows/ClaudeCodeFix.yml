name: Claude Code Fix

# ── Triggers ─────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  claude:
    runs-on: ubuntu-latest

    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude'))

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify Claude
        run: |
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
          which claude
          claude --version

      - name: Install UiPath CLI
        run: npm install -g @uipath/cli

      - name: Install UiPath Tools
        run: |
          uip tools install @uipath/orchestrator-tool
          uip tools install @uipath/solution-tool

      - name: Install Claude Skill
        run: uip skills install --agent claude

      - name: Install Dependencies
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi
          if [ -f yarn.lock ]; then
            npm install -g yarn
            yarn install
          fi
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          fi

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # ── Build Prompt ───────────────────────────────────────────────────────
      - name: Build Prompt
        id: build_prompt
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT='${{ github.event.comment.body }}'
            TASK="${COMMENT/@claude/}"
            TASK="${TASK#"${TASK%%[![:space:]]*}"}"

            cat >> $GITHUB_ENV << 'PROMPT'
          PROMPT=You are an expert UiPath RPA developer and test automation engineer.

          This is a UiPath test automation project that automates ServiceNow incident lifecycle testing via browser automation. All automation logic is in XAML workflows under Workflows/ and test cases under TestCases/. Use the UiPath skills available to you (uipath-rpa, uipath-test, uipath-review, uipath-troubleshoot) to understand and fix the issue.

          ISSUE #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

          ISSUE DESCRIPTION:
          ${{ github.event.issue.body }}

          USER REQUEST (from comment):
          TASK_PLACEHOLDER

          INSTRUCTIONS:
          1. Read the issue description and user request carefully
          2. Use UiPath skills to analyse the relevant XAML files (Workflows/ and TestCases/)
          3. Identify the root cause of the issue
          4. Implement the fix directly in the relevant XAML or config files
          5. Create a file called REPORT.md in the root with these sections:
             ## Issue Summary
             - What the issue was and its root cause
             ## Changes Made
             - List every file changed and exactly what was changed
             ## UiPath Analysis
             - Findings from UiPath skill analysis (workflow structure, selectors, activities)
             ## Testing Notes
             - What to verify after the fix is applied
             ## Risk Assessment
             - Any risks or side effects of the change
          6. Do NOT run git commit or git push

          PROMPT
            # Replace placeholder with actual task
            sed -i "s|TASK_PLACEHOLDER|${TASK}|g" $GITHUB_ENV

          else
            cat >> $GITHUB_ENV << 'PROMPT'
          PROMPT=You are an expert UiPath RPA developer and test automation engineer.

          This is a UiPath test automation project that automates ServiceNow incident lifecycle testing via browser automation. All automation logic is in XAML workflows under Workflows/ and test cases under TestCases/. Use the UiPath skills available to you (uipath-rpa, uipath-test, uipath-review, uipath-troubleshoot) to analyse the entire project.

          INSTRUCTIONS:
          1. Use UiPath skills to analyse all XAML files in Workflows/ and TestCases/
          2. Read project.json for version and dependency details
          3. Review CLAUDE.md for project guidelines
          4. Create ANALYSIS.md in the root with:
             ## Project Overview
             - Purpose, tech stack, UiPath version
             ## Repository Structure
             - Every folder and key file with a one-line description
             ## Test Cases
             - For each file in TestCases/, describe what scenario it tests
             ## Workflows
             - For each file in Workflows/, describe what it does
             ## Dependencies
             - Packages from project.json
             ## Known Issues / Observations
             - Anything missing, broken, or worth noting
             ## Recommendations
             - Suggested improvements
          5. Do NOT run git commit or git push

          PROMPT
          fi

      # ── Run Claude ─────────────────────────────────────────────────────────
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: "actions: read"
          prompt: ${{ env.PROMPT }}
          claude_args: "--max-turns 50 --permission-mode bypassPermissions"

      # ── Debug ──────────────────────────────────────────────────────────────
      - name: Debug Repository
        run: |
          echo "===== Git Status ====="
          git status
          echo ""
          echo "===== Changed Files ====="
          git diff --name-only
          echo ""
          echo "===== Diff ====="
          git diff
          echo ""
          echo "===== New/Untracked Files ====="
          git ls-files --others --exclude-standard

      # ── Check for Changes ──────────────────────────────────────────────────
      - name: Verify Claude Changes
        id: verify
        shell: bash
        run: |
          if git diff --quiet && git diff --staged --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No repository changes detected — skipping PR creation."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected."
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── Create PR ──────────────────────────────────────────────────────────
      - name: Create Pull Request
        if: steps.verify.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: claude/${{ github.run_id }}
          title: >-
            ${{ github.event_name == 'issue_comment'
              && format('fix: Issue #{0} — {1}', github.event.issue.number, github.event.issue.title)
              || 'docs: UiPath project analysis (ANALYSIS.md)' }}
          commit-message: >-
            ${{ github.event_name == 'issue_comment'
              && format('fix(#{0}): Claude automated fix', github.event.issue.number)
              || 'docs: add ANALYSIS.md project analysis' }}
          delete-branch: true
          body: |
            ## Claude Code — Automated Fix

            | Field | Value |
            |---|---|
            | **Trigger** | `${{ github.event_name }}` |
            | **Run** | `${{ github.run_id }}` |
            ${{ github.event_name == 'issue_comment' && format('| **Issue** | #{0} {1} |', github.event.issue.number, github.event.issue.title) || '| **Task** | Repository analysis |' }}

            ${{ github.event_name == 'issue_comment' && '### Request' || '' }}
            ${{ github.event_name == 'issue_comment' && github.event.comment.body || '' }}

            ---
            > See **REPORT.md** (for issue fixes) or **ANALYSIS.md** (for analysis runs) in this PR for full details.
