name: Claude Code Fix

on:
  workflow_dispatch:

  issue_comment:
    types:
      - created

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Verify Claude CLI
        run: |
          echo "$(npm prefix -g)/bin" >> $GITHUB_PATH
          which claude
          claude --version

      - name: Install UiPath CLI
        run: |
          npm install -g @uipath/cli

      - name: Install UiPath Tools
        run: |
          uip tools install @uipath/orchestrator-tool
          uip tools install @uipath/solution-tool

      - name: Install Claude Skill
        run: |
          uip skills install --agent claude

      - name: Install Project Dependencies
        shell: bash
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
          fi

          if [ -f yarn.lock ]; then
            npm install -g yarn
            yarn install
          fi

          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          fi

          if [ -f project.json ]; then
            echo "UiPath project detected."
          fi

      - name: Verify Environment
        run: |
          echo "===== Git ====="
          git --version

          echo "===== Node ====="
          node --version

          echo "===== npm ====="
          npm --version

          echo "===== Claude ====="
          claude --version

          echo "===== UiPath CLI ====="
          uip --version

          echo "===== Installed Tools ====="
          uip tools list

          echo "===== Installed Skills ====="
          uip skills list

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Create a file named CLAUDE_TEST.md in main directory folder.

            Contents:

            # Claude Test

            OK

            Do not modify any other files.
            show_full_output: true
            display_report: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      - name: Create Workflow Marker
        run: |
          mkdir -p .github

          cat > .github/workflow-test.md <<EOF
          # GitHub Actions Smoke Test

          This file is automatically generated by the GitHub Actions workflow.

          ## Environment

          - Repository: ${{ github.repository }}
          - Workflow: ${{ github.workflow }}
          - Event: ${{ github.event_name }}
          - Run ID: ${{ github.run_id }}
          - Run Number: ${{ github.run_number }}
          - Branch: ${{ github.ref_name }}
          - Commit: ${{ github.sha }}
          - Generated: $(date -u)

          ## Status

          - Repository checked out
          - Claude Code CLI installed
          - UiPath CLI installed
          - UiPath tools installed
          - Claude skill installed
          - Project dependencies installed
          - Environment verified

          This file is generated automatically to ensure a Pull Request contains at least one change.
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: setup-${{ github.run_id }}
          title: "Development environment setup"
          commit-message: "Setup development environment"
          delete-branch: true
          body: |
            ## Automated Environment Setup

            Completed:
            - Repository checked out
            - Claude Code CLI installed
            - UiPath CLI installed
            - UiPath tools installed
            - Claude skill installed
            - Project dependencies installed
            - Environment verified

            Claude automation is currently disabled.
            It will be enabled in a future update.
